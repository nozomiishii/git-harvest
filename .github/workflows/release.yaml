name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

# 同時実行を防止し、release-pr が未完了のリリースを参照する競合を回避する
concurrency:
  group: release
  cancel-in-progress: false

# デフォルト権限を無効化し、各ジョブで必要最小限の権限のみ付与する
permissions: {}

jobs:
  # release PR がマージされていれば draft release + tag を作成
  create-draft-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # required by release-please to create git tags and draft GitHub releases
      issues: write # kept to match release-please's documented permission set (avoids divergence-debugging later)
      pull-requests: write # required by release-please to open and update the release PR

    outputs:
      release_created: ${{ steps.detect.outputs.release_created }}
      tag_name: ${{ steps.detect.outputs.tag_name }}

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.34.0"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          # GitHub requires workflows:write to create a release/tag on a commit that is
          # not the current branch head. release-please tags the (already-merged, now
          # non-head) release commit, so without this the create-release call returns
          # 403 "Resource not accessible by integration".
          permission-workflows: write

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release-please github-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
        run: |
          pnpm exec release-please github-release \
            --repo-url="${REPO_URL}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"

      - name: Detect created release
        id: detect
        run: |
          VERSION=$(jq -r '."."' .github/.release-please-manifest.json)
          TAG_NAME="v${VERSION}"
          if gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q 'true'; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # draft release を publish（npm が配布元なので単体バイナリは添付しない）。
  # npm publish が失敗したのに GitHub release だけ確定するのを防ぐため、npm-publish 成功後に実行する
  publish-release:
    needs: [create-draft-release, npm-publish]
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # required by gh release edit to publish the draft release

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.create-draft-release.outputs.tag_name }}
          persist-credentials: false

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: gh release edit "${TAG_NAME}" --draft=false

  npm-publish:
    needs: create-draft-release
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read # required by actions/checkout to fetch the tagged release commit
      id-token: write # required by npm publish to mint an OIDC token for provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.create-draft-release.outputs.tag_name }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # publish 時に prepublishOnly（pnpm build）が dist/ を生成するため、別の Build step は不要。
      # prepare（lefthook install）も devDependencies インストール済みなので publish 時に無害に通る。
      # tag checkout は detached HEAD で publish-branch チェックに掛かるため --no-git-checks を付ける。
      - name: Publish to npm
        run: pnpm publish --no-git-checks

  release-pr:
    needs: [create-draft-release, npm-publish, publish-release]
    if: ${{ always() && !cancelled() && needs.npm-publish.result != 'failure' && needs.publish-release.result != 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # required by release-please to push release PR branches
      pull-requests: write # required by release-please to open and update the release PR

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.34.0"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release-please release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
        run: |
          pnpm exec release-please release-pr \
            --repo-url="${REPO_URL}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"
