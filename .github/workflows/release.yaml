name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

# 同時実行を防止し、release-pr が未完了のリリースを参照する競合を回避する
concurrency:
  group: release
  cancel-in-progress: false

# デフォルト権限を無効化し、各ジョブで必要最小限の権限のみ付与する
permissions: {}

jobs:
  # release PR がマージされていれば draft release + tag を作成
  create-draft-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # required by release-please to create git tags and draft GitHub releases
      issues: write  # kept to match release-please's documented permission set (avoids divergence-debugging later)
      pull-requests: write  # required by release-please to open and update the release PR

    outputs:
      release_created: ${{ steps.detect.outputs.release_created }}
      tag_name: ${{ steps.detect.outputs.tag_name }}

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.34.0"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          # GitHub requires workflows:write to create a release/tag on a commit that is
          # not the current branch head. release-please tags the (already-merged, now
          # non-head) release commit, so without this the create-release call returns
          # 403 "Resource not accessible by integration".
          permission-workflows: write

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release-please github-release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
        run: |
          bunx release-please github-release \
            --repo-url="${REPO_URL}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"

      - name: Detect created release
        id: detect
        run: |
          VERSION=$(jq -r '."."' .github/.release-please-manifest.json)
          TAG_NAME="v${VERSION}"
          if gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q 'true'; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  # darwin-arm64 単体バイナリを upload + draft release を publish
  # macOS runner で native ビルドし cross-compile リスクを避ける（Homebrew / curl 配布用）
  upload-assets:
    needs: create-draft-release
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: write  # required by gh release upload/edit to attach assets and publish the draft release

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.create-draft-release.outputs.tag_name }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build darwin-arm64 binary
        run: bun build lib/cli.ts --compile --target=bun-darwin-arm64 --outfile git-harvest-darwin-arm64

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: gh release upload "${TAG_NAME}" git-harvest-darwin-arm64

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: gh release edit "${TAG_NAME}" --draft=false

  npm-publish:
    needs: create-draft-release
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read  # required by actions/checkout to fetch the tagged release commit
      id-token: write  # required by npm publish to mint an OIDC token for provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.create-draft-release.outputs.tag_name }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundle
        run: bun run build

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      # prepare/prepack は npm publish でも走る。配布物は上の Build bundle で生成済みなので、
      # 二重ビルド（prepack）と CI 不要な lefthook install（prepare）を避けるため scripts は無効化する。
      - name: Publish to npm
        run: npm publish --ignore-scripts

  # 公開済みリリースの darwin-arm64 バイナリの sha256 を計算し
  # homebrew-tap の formula 更新 PR を作る（mislav のサイレント失敗を避け PR 方式で可視化）
  homebrew-bump:
    needs: [create-draft-release, upload-assets]
    if: needs.create-draft-release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read  # required by gh release download to fetch the published binary from this repo

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.34.0"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      # homebrew-tap だけにスコープを絞った App token（fork せず tap 内にブランチを切る）
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          owner: nozomiishii
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nozomiishii/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}

      - name: Compute formula version and sha256
        id: formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create-draft-release.outputs.tag_name }}
        run: |
          gh release download "${TAG_NAME}" \
            --repo nozomiishii/git-harvest \
            -p git-harvest-darwin-arm64 \
            -D "${RUNNER_TEMP}"
          SHA=$(shasum -a 256 "${RUNNER_TEMP}/git-harvest-darwin-arm64" | awk '{print $1}')
          VERSION="${TAG_NAME#v}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # url は #{version} 由来なので触らず、version 行と sha256 行だけ書き換える
      - name: Bump formula
        env:
          VERSION: ${{ steps.formula.outputs.version }}
          SHA: ${{ steps.formula.outputs.sha }}
        run: |
          sed -i -E "s/^  version \".*\"/  version \"${VERSION}\"/" Formula/git-harvest.rb
          sed -i -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Formula/git-harvest.rb

      - name: Create pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: update git-harvest formula to v${{ steps.formula.outputs.version }}"
          title: "chore: update git-harvest formula to v${{ steps.formula.outputs.version }}"
          body: |
            Automated formula bump for git-harvest v${{ steps.formula.outputs.version }}.

            - version: `${{ steps.formula.outputs.version }}`
            - sha256: `${{ steps.formula.outputs.sha }}`
          branch: update-git-harvest-${{ steps.formula.outputs.version }}
          base: main

  # publish 後に次の release PR を作成/更新
  release-pr:
    needs: [create-draft-release, upload-assets]
    if: ${{ always() && !cancelled() && needs.upload-assets.result != 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # required by release-please to push release PR branches
      pull-requests: write  # required by release-please to open and update the release PR

    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4
        with:
          # renovate: datasource=docker depName=1password/op versioning=semver
          version: "2.34.0"
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          APP_ID: op://github-app/nozomiishii-release/username
          APP_PRIVATE_KEY: op://github-app/nozomiishii-release/credential

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ steps.secrets.outputs.APP_ID }}
          private-key: ${{ steps.secrets.outputs.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release-please release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO_URL: ${{ github.repository }}
        run: |
          bunx release-please release-pr \
            --repo-url="${REPO_URL}" \
            --config-file=.github/.release-please-config.json \
            --manifest-file=.github/.release-please-manifest.json \
            --token="${GITHUB_TOKEN}"
