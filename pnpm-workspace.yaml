# 依存の postinstall（build script）は走らせない。ネイティブバイナリは
# optionalDependencies 経由で入るため不要で、third-party script の実行も避ける。
allowBuilds:
  "@swc/core": false
  esbuild: false
  lefthook: false
  unrs-resolver: false

# pnpm 既定の minimumReleaseAge（新しすぎる公開を弾く supply-chain cooldown）から
# 自前スコープを除外する。自分で publish した信頼済みパッケージなので待たない。
# third-party への cooldown は維持する。
minimumReleaseAgeExclude:
  - "@nozomiishii/*"
