# pnpm v11 で onlyBuiltDependencies(配列)は廃止。allowBuilds(マップ)で許可を明示する。
allowBuilds:
  "@swc/core": true
  esbuild: true
  lefthook: true
  unrs-resolver: true

# pnpm v11 デフォルトの minimumReleaseAge(公開1日後まで採用しない) から除外する。
# 自分の管理パッケージは Renovate も遅延なしで取り込むため、CI の supply-chain 照合と衝突する。
minimumReleaseAgeExclude:
  - "@nozomiishii/*"
